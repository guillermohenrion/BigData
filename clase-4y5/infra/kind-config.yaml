# Configuración del clúster Kind para MLOps
# Este archivo define cómo se crea el clúster local de Kubernetes

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: mlops-cluster

# Configuración de nodos
nodes:
  - role: control-plane
    # Port mappings: exponer puertos de NodePort al host
    extraPortMappings:
      # MLflow UI
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
      # Evidently UI
      - containerPort: 30002
        hostPort: 30002
        protocol: TCP
      # Jupyter Lab
      - containerPort: 30003
        hostPort: 30003
        protocol: TCP
      # Iris API (opcional, para acceso directo)
      - containerPort: 30004
        hostPort: 30004
        protocol: TCP
  
  # Worker 1: Corre aplicaciones
  - role: worker
  
  # Worker 2: Corre aplicaciones
  - role: worker

